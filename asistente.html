<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente - UCAM CERT</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<div class="bg-[#8B1D1D] text-white p-6 flex justify-between">
  <h1 class="text-xl font-bold">Panel Asistente - UCAM CERT</h1>
  <button onclick="logout()">Salir</button>
</div>

<div class="p-8">
  <h2 class="text-2xl font-bold mb-4">Soporte Operativo</h2>
  <p class="text-gray-600">Aquí podrás asistir en tareas de soporte y seguimiento.</p>
</div>

<script>
const SUPABASE_URL = 'https://xehflnbpyatodvcwkflw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlaGZsbmJweWF0b2R2Y3drZmx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzQ1NjIsImV4cCI6MjA5MjAxMDU2Mn0.m3yEFlw8AuEShgNqPDific8A8GcJxsBSVryfWDesdpI';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) return window.location.href = 'index.html';

  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('*')
    .eq('id', session.user.id)
    .single();

  if (!profile || profile.rol !== 'asistente') {
    window.location.href = 'dashboard.html';
  }
}

async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = 'index.html';
}

init();
</script>

</body>
</html>
