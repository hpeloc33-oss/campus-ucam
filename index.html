<script>

// 🔥 CLIENTE SUPABASE
let supa;

if (!window.supabaseClient) {
    window.supabaseClient = supabase.createClient(
        "https://xehflnbpyatodvcwkflw.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInR5cCI6IkpXVCJ9"
    );
}

supa = window.supabaseClient;


// 👁 VER PASSWORD
function togglePassword() {
    const p = document.getElementById("password");
    p.type = p.type === "password" ? "text" : "password";
}


// 🔐 LOGIN + ROL (FIX REAL)
async function login() {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    msg.innerText = "Verificando...";

    const { data, error } = await supa.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        msg.innerText = error.message;
        msg.style.color = "red";
        return;
    }

    // 🔥 IMPORTANTE: asegurar que user exista
    const user = data.user;

    if (!user || !user.id) {
        msg.innerText = "Error obteniendo usuario";
        msg.style.color = "red";
        return;
    }

    // 🔥 CAMBIO CLAVE AQUÍ
    const { data: profile, error: errorProfile } = await supa
        .from('profiles')
        .select('*')
        .eq('id', user.id)
        .maybeSingle(); // 👈 ESTE ES EL FIX

    if (errorProfile) {
        msg.innerText = "Error cargando perfil";
        msg.style.color = "red";
        return;
    }

    if (!profile) {
        msg.innerText = "Perfil no encontrado";
        msg.style.color = "red";
        return;
    }

    msg.innerText = "Acceso correcto";
    msg.style.color = "green";

    // 🚀 REDIRECCIÓN
    setTimeout(() => {

        const rol = profile.rol;

        if (rol === "admin") window.location.href = "admin.html";
        else if (rol === "secretaria") window.location.href = "secretaria.html";
        else if (rol === "instructor") window.location.href = "instructor.html";
        else if (rol === "asistente") window.location.href = "asistente.html";
        else window.location.href = "dashboard.html";

    }, 1000);
}

</script>
