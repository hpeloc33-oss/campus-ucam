<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Virtual - Instituto UCAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .campus-card { background: white; border-top: 6px solid #1e3a8a; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="campus-card max-w-md w-full p-10 rounded-xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight uppercase">Instituto UCAM</h1>
            <div class="h-1 w-12 bg-blue-800 mx-auto mt-2"></div>
            <p class="text-gray-500 text-sm mt-3 font-medium">Gestión de Impacto Ambiental Positivo</p>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Correo del Cursante</label>
                <input type="email" id="email" placeholder="usuario@ucamcert.pro" 
                    class="w-full px-4 py-3 rounded border border-gray-300 focus:ring-2 focus:ring-blue-800 outline-none transition">
            </div>
            
            <div class="relative">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" 
                    class="w-full px-4 py-3 rounded border border-gray-300 focus:ring-2 focus:ring-blue-800 outline-none transition">
                <button type="button" onclick="togglePass()" class="absolute right-3 top-9 text-gray-400 hover:text-blue-800 font-medium text-xs">
                    MOSTRAR
                </button>
            </div>

            <button onclick="signIn()" class="w-full bg-[#1e3a8a] text-white font-bold py-3 rounded hover:bg-blue-900 transition shadow-md uppercase tracking-widest text-sm">
                Acceder al Programa
            </button>
            
            <p id="message" class="text-sm mt-4 text-center font-semibold min-h-[20px]"></p>
        </div>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center text-[10px] text-gray-400 uppercase tracking-[0.2em]">
            Certificación Ambiental Internacional
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xehflnbpyatodvcwkflw.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_cKDc07c8dfsj4tarmudjja_9_Avq_qS_m74uU8Rz_5o'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function togglePass() {
            const passInput = document.getElementById('password');
            const btn = event.target;
            if (passInput.type === "password") {
                passInput.type = "text";
                btn.innerText = "OCULTAR";
            } else {
                passInput.type = "password";
                btn.innerText = "MOSTRAR";
            }
        }

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            
            msg.className = "text-sm mt-4 text-center font-semibold text-blue-600";
            msg.innerText = "Verificando credenciales...";

            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                msg.className = "text-sm mt-4 text-center font-semibold text-red-600";
                msg.innerText = "Error: " + error.message;
            } else {
                msg.className = "text-sm mt-4 text-center font-semibold text-green-600";
                msg.innerText = "Ingreso exitoso. Cargando módulos...";
                // Aquí redirigiremos a la página de contenidos técnicos
            }
        }
    </script>
</body>
</html>
