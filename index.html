<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Virtual - Instituto UCAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background-image: url('https://images.unsplash.com/photo-1523050853063-bd80e29247f5?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-blend-mode: overlay; background-color: #4a0404;">
    <div class="glass max-w-md w-full p-8 rounded-2xl shadow-2xl text-center border-t-8 border-[#4a0404]">
        <h1 class="text-3xl font-bold text-[#4a0404] mb-2 uppercase">Instituto UCAM</h1>
        <p class="text-gray-600 mb-8 font-medium">Gestión de Impacto Ambiental Positivo</p>
        
        <div id="login-form" class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1 font-sans">Correo del Estudiante</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#4a0404]">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1 font-sans">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#4a0404]">
            </div>
            <button onclick="signIn()" class="w-full bg-[#4a0404] text-white font-bold py-3 rounded-lg hover:bg-[#600505] transition shadow-lg mt-4 uppercase tracking-widest">
                Ingresar al Campus
            </button>
            <p id="message" class="text-red-600 text-sm mt-2 text-center font-medium"></p>
        </div>
    </div>

    <script>
        // Configuración extraída de tus capturas
        const SUPABASE_URL = 'https://xehflnbpyatodvcwkflw.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_cKDc07c8dfsj4tarmudjja_9_Avq_qS_m74uU8Rz_5o'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            msg.innerText = "Verificando...";

            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                msg.innerText = "Error: Credenciales no válidas";
            } else {
                msg.classList.remove('text-red-600');
                msg.classList.add('text-green-600');
                msg.innerText = "¡Ingreso exitoso! Bienvenido cursante.";
                // Aquí podrías redirigir a la página de módulos
            }
        }
    </script>
</body>
</html>
