<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Virtual - Instituto UCAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .campus-card { background: white; border-top: 5px solid #0f172a; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="campus-card max-w-sm w-full p-8 rounded-lg shadow-xl border border-gray-100">
        <div class="text-center mb-10">
            <h1 class="text-xl font-bold text-slate-900 tracking-tighter uppercase">Instituto UCAM</h1>
            <p class="text-slate-400 text-[11px] mt-2 font-semibold tracking-widest uppercase">Gestión de Impacto Ambiental Positivo</p>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Email del Cursante</label>
                <input type="email" id="email" class="w-full px-4 py-3 rounded bg-slate-50 border border-slate-200 text-sm focus:outline-none focus:border-slate-900 transition">
            </div>
            
            <div class="relative">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Contraseña</label>
                <input type="password" id="password" class="w-full px-4 py-3 rounded bg-slate-50 border border-slate-200 text-sm focus:outline-none focus:border-slate-900 transition">
                <button type="button" onclick="togglePass()" id="toggleBtn" class="absolute right-3 top-[34px] text-[9px] font-bold text-slate-400 hover:text-slate-900 uppercase">Mostrar</button>
            </div>

            <button onclick="signIn()" class="w-full bg-slate-900 text-white font-bold py-4 rounded text-[11px] uppercase tracking-[0.2em] hover:bg-black transition-all shadow-lg">
                Ingresar al Programa
            </button>
            
            <p id="message" class="text-[11px] mt-4 text-center font-bold min-h-[16px]"></p>
        </div>
    </div>

    <script>
        // Tus llaves verificadas de Supabase
        const SUPABASE_URL = 'https://xehflnbpyatodvcwkflw.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_cKDc07c8dfsj4tarmudjjA_9_AvqoEa'; 

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function togglePass() {
            const p = document.getElementById('password');
            const b = document.getElementById('toggleBtn');
            p.type = p.type === "password" ? "text" : "password";
            b.innerText = p.type === "password" ? "Mostrar" : "Ocultar";
        }

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            
            msg.className = "text-[11px] mt-4 text-center font-bold text-slate-400";
            msg.innerText = "VERIFICANDO...";

            const { error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                msg.className = "text-[11px] mt-4 text-center font-bold text-red-600 uppercase";
                msg.innerText = "Error: " + error.message;
            } else {
                msg.className = "text-[11px] mt-4 text-center font-bold text-emerald-600 uppercase";
                msg.innerText = "Acceso concedido. Bienvenido.";
                // Aquí seguiremos con la carga de contenidos técnicos
            }
        }
    </script>
</body>
</html>
