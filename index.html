<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Campus - Instituto UCAM CERT</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
            url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070');
            background-size: cover;
            background-position: center;
        }

        .btn-ucam {
            background-color: #8B1D1D;
        }

        .btn-ucam:hover {
            background-color: #631515;
        }

        .glass {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6">

<div class="text-center mb-8">
    <h1 class="text-4xl font-bold text-white">Acceso al Campus UCAM CERT</h1>
</div>

<div class="glass w-full max-w-md p-8 rounded-2xl shadow-xl">

    <div class="text-center mb-6">
        <h2 class="text-xl font-bold">Ingreso</h2>
    </div>

    <input id="email" type="email" placeholder="Email"
        class="w-full mb-4 p-3 border rounded-xl">

    <input id="password" type="password" placeholder="Contraseña"
        class="w-full mb-4 p-3 border rounded-xl">

    <button onclick="login()"
        class="btn-ucam w-full text-white py-3 rounded-xl font-bold">
        INGRESAR
    </button>

    <p id="msg" class="text-center text-sm mt-4"></p>

</div>

<script>
const SUPABASE_URL = "https://xehflnbpyatodvcwkflw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlaGZsbmJweWF0b2R2Y3drZmx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzQ1NjIsImV4cCI6MjA5MjAxMDU2Mn0.m3yEFlw8AuEShgNqPDific8A8GcJxsBSVryfWDesdpI";

const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    if (!email || !password) {
        msg.innerText = "Completa todos los campos";
        msg.style.color = "red";
        return;
    }

    msg.innerText = "Verificando...";
    msg.style.color = "gray";

    const { data, error } = await supa.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        msg.innerText = error.message;
        msg.style.color = "red";
        return;
    }

    msg.innerText = "Acceso correcto";
    msg.style.color = "green";

    // 🔥 REDIRECCIÓN REAL
    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 1000);
}
</script>

</body>
</html>
