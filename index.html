<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Virtual - Instituto UCAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .ucam-card { background: white; border-top: 6px solid #0f172a; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="ucam-card max-w-sm w-full p-10 rounded-xl shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-bold text-slate-900 tracking-tighter uppercase">Instituto UCAM</h1>
            <p class="text-slate-400 text-[10px] mt-2 font-bold tracking-[0.3em] uppercase">Gestión de Impacto Ambiental Positivo</p>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Email del Cursante</label>
                <input type="email" id="email" class="w-full px-4 py-3 rounded-lg bg-slate-50 border border-slate-200 text-sm focus:outline-none focus:border-slate-900 transition">
            </div>
            
            <div class="relative">
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Contraseña</label>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-lg bg-slate-50 border border-slate-200 text-sm focus:outline-none focus:border-slate-900 transition">
            </div>

            <button onclick="signIn()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-lg text-[11px] uppercase tracking-[0.2em] hover:bg-black transition-all shadow-lg active:scale-95">
                Ingresar al Programa
            </button>
            
            <p id="message" class="text-[10px] text-center font-bold uppercase min-h-[20px]"></p>
        </div>
    </div>

    <script>
        // Configuración de Supabase con tus datos reales
        const SUPABASE_URL = 'https://xehflnbpyatodvcwkflw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlaGZsbmJweWF0b2R2Y3drZmx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzQ1NjIsImV4cCI6MjA5MjAxMDU2Mn0.m3yEFlw8AuEShgNqPDific8A8GcJxsBSVryfWDesdpI';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            
            msg.className = "text-[10px] text-center font-bold text-slate-400 uppercase";
            msg.innerText = "Verificando credenciales...";

            const { error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                msg.className = "text-[10px] text-center font-bold text-red-600 uppercase";
                msg.innerText = "Error: " + error.message;
            } else {
                msg.className = "text-[10px] text-center font-bold text-emerald-600 uppercase";
                msg.innerText = "Acceso concedido. Bienvenido.";
                // Aquí podrías redirigir a la página de módulos
            }
        }
    </script>
</body>
</html>
