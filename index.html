<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acceso al Campus - Instituto UCAM CERT</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #5a5a5a;
}
</style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center">

<h1 class="text-4xl font-bold text-white mb-2">
Acceso al Campus Instituto UCAM CERT
</h1>

<p class="text-white mb-6 opacity-80">
Formación profesional con respaldo académico internacional
</p>

<div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">

    <h2 class="text-xl font-bold text-center mb-4">
        Ingreso al Campus
    </h2>

    <p class="text-center text-gray-500 mb-6">
        Ingresa tus credenciales para acceder
    </p>

    <!-- EMAIL -->
    <label class="text-sm text-gray-600">Usuario</label>
    <input id="email" type="email"
        class="w-full mt-1 mb-4 p-3 rounded-lg bg-gray-100 outline-none"
        placeholder="tu@correo.com">

    <!-- PASSWORD -->
    <label class="text-sm text-gray-600">Contraseña</label>

    <div class="relative">
        <input id="password" type="password"
            class="w-full mt-1 mb-4 p-3 rounded-lg bg-gray-100 outline-none">

        <span onclick="togglePassword()"
            style="position:absolute; right:10px; top:12px; cursor:pointer;">
            👁
        </span>
    </div>

    <!-- BOTON -->
    <button onclick="login()"
        class="w-full bg-red-800 text-white py-3 rounded-lg font-bold">
        Ingresar
    </button>

    <p class="text-center text-red-600 mt-4 text-sm">
        ¿Olvidaste tu contraseña?
    </p>

    <p id="msg" class="text-center mt-4 text-sm"></p>

</div>

<img src="logo-instituto-ucam-cert.png"
     style="width:120px; margin-top:20px;">

<script>

// 🔥 SUPABASE (SOLO UNA VEZ)
const supabase = window.supabase.createClient(
"https://xehflnbpyatodvcwkflw.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlaGZsbmJweWF0b2R2Y3drZmx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzQ1NjIsImV4cCI6MjA5MjAxMDU2Mn0.m3yEFlw8AuEShgNqPDific8A8GcJxsBSVryfWDesdpI"
);

// 👁 VER CONTRASEÑA
function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}

// 🔐 LOGIN
async function login() {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    msg.innerText = "Verificando...";

    const { error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        msg.innerText = error.message;
        msg.style.color = "red";
        return;
    }

    msg.innerText = "Acceso correcto";
    msg.style.color = "green";

    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 1000);
}

</script>

</body>
</html>
