<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Campus - Instituto UCAM CERT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
        }

        .btn-ucam {
            background-color: #8B1D1D; /* El guinda corporativo */
            transition: all 0.3s ease;
        }

        .btn-ucam:hover {
            background-color: #631515;
            transform: translateY(-1px);
        }

        .input-focus:focus {
            border-color: #8B1D1D;
            ring-color: #8B1D1D;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Encabezado Superior -->
    <div class="text-center mb-8">
        <h1 class="text-3xl md:text-5xl font-bold text-white mb-2 tracking-tight">
            Acceso al Campus Instituto UCAM CERT
        </h1>
        <p class="text-white text-lg opacity-90 font-light">
            Formación profesional con respaldo académico internacional
        </p>
    </div>

    <!-- Tarjeta de Login -->
    <div class="glass-card w-full max-w-md p-8 md:p-12 shadow-2xl">
        <div class="flex justify-center mb-6">
            <div class="bg-[#8B1D1D] p-4 rounded-full shadow-inner">
                <i class="fas fa-user-graduate text-white text-3xl"></i>
            </div>
        </div>

        <div class="text-center mb-10">
            <h2 class="text-2xl font-bold text-gray-800">Ingreso al Campus</h2>
            <p class="text-gray-500 text-sm mt-1">Ingresa tus credenciales para acceder</p>
        </div>

        <div class="space-y-6">
            <div class="relative">
                <label class="block text-xs font-semibold text-gray-600 uppercase mb-2 ml-1">Correo electrónico</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="far fa-envelope"></i>
                    </span>
                    <input type="email" id="email" 
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#8B1D1D] transition-all"
                        placeholder="tu@email.com">
                </div>
            </div>

            <div class="relative">
                <label class="block text-xs font-semibold text-gray-600 uppercase mb-2 ml-1">Contraseña</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="password" 
                        class="w-full pl-10 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#8B1D1D] transition-all"
                        placeholder="••••••••">
                    <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 cursor-pointer">
                        <i class="far fa-eye text-xs"></i>
                    </span>
                </div>
            </div>

            <button onclick="signIn()" 
                class="btn-ucam w-full text-white font-bold py-4 rounded-xl text-sm uppercase tracking-widest shadow-lg mt-4">
                Ingresar
            </button>

            <div class="text-center space-y-4">
                <a href="#" class="text-xs text-[#8B1D1D] font-bold hover:underline">¿Olvidaste tu contraseña?</a>
                <p id="message" class="text-[10px] font-bold uppercase min-h-[20px]"></p>
                <p class="text-[10px] text-gray-400 leading-relaxed uppercase">
                    Si tienes problemas para acceder, contacta al soporte técnico
                </p>
            </div>
        </div>
    </div>

    <!-- Logo Inferior -->
    <div class="mt-12">
        <div class="bg-white p-4 rounded-lg shadow-md border border-gray-100">
            <!-- Espacio para el logo del Instituto UCAM CERT -->
            <div class="flex flex-col items-center">
                <span class="text-[#8B1D1D] font-bold text-sm tracking-tighter">INSTITUTO</span>
                <span class="text-gray-900 font-bold text-xl leading-none">UCAM CERT</span>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://xehflnbpyatodvcwkflw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlaGZsbmJweWF0b2R2Y3drZmx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzQ1NjIsImV4cCI6MjA5MjAxMDU2Mn0.m3yEFlw8AuEShgNqPDific8A8GcJxsBSVryfWDesdpI';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            
            msg.className = "text-[10px] text-center font-bold text-gray-500 uppercase";
            msg.innerText = "Verificando acceso...";

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                msg.className = "text-[10px] text-center font-bold text-red-600 uppercase";
                msg.innerText = "Error: " + error.message;
            } else {
                msg.className = "text-[10px] text-center font-bold text-emerald-600 uppercase";
                msg.innerText = "Acceso concedido. Redirigiendo...";
                
                // Aquí en el futuro derivaremos según el correo o rol
                // window.location.href = 'campus.html';
            }
        }
    </script>
</body>
</html>
