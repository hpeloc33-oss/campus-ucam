<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Virtual - Instituto UCAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background-image: url('https://images.unsplash.com/photo-1523050853063-bd80e29247f5?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-blend-mode: overlay; background-color: #4a0404;">
    <div class="glass max-w-md w-full p-8 rounded-2xl shadow-2xl text-center border-t-8 border-[#4a0404]">
        <h1 class="text-3xl font-bold text-[#4a0404] mb-2 uppercase">Instituto UCAM</h1>
        <p class="text-gray-600 mb-8 font-medium">Gestión de Impacto Ambiental Positivo</p>
        
        <form class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Correo del Estudiante</label>
                <input type="email" placeholder="ejemplo@correo.com" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#4a0404]">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Contraseña</label>
                <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#4a0404]">
            </div>
            <button type="button" class="w-full bg-[#4a0404] text-white font-bold py-3 rounded-lg hover:bg-[#600505] transition shadow-lg mt-4 uppercase tracking-widest">
                Ingresar al Campus
            </button>
        </form>
        
        <div class="mt-6 text-sm text-gray-500 italic">
            ¿Eres un nuevo cursante? Contacta a la Secretaría Técnica.
        </div>
    </div>
</body>
</html>
